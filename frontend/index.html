<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamersAnonimos - Búsqueda de Juegos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 GamersAnonimos</h1>
            <p>Busca y ordena tus juegos favoritos</p>
        </header>

        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Busca un juego por nombre..."
                    autocomplete="off"
                >
                <button onclick="buscarJuegos()">Buscar</button>
            </div>
            <div class="filter-options">
                <button class="sort-button active" onclick="ordenarPor('az')">A-Z</button>
                <button class="sort-button" onclick="ordenarPor('za')">Z-A</button>
            </div>
            <div class="info-text" id="infoText"></div>
        </div>

        <div id="loading" class="loading" style="display: none;">Cargando juegos...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="noResults" class="no-results" style="display: none;">No se encontraron juegos</div>
        <div id="gamesContainer" class="games-container"></div>
    </div>

    <div id="gameModal" class="game-modal" aria-hidden="true">
        <div class="game-modal__backdrop" data-modal-close></div>
        <div class="game-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="gameModalTitle">
            <button class="game-modal__close" type="button" aria-label="Cerrar modal" data-modal-close>×</button>
            <div class="game-modal__media">
                <img id="gameModalImage" class="game-modal__image" src="" alt="">
                <div id="gameModalBadges" class="game-modal__badges"></div>
            </div>
            <div class="game-modal__content">
                <div class="game-modal__header">
                    <h2 id="gameModalTitle" class="game-modal__title"></h2>
                    <p id="gameModalRelease" class="game-modal__release"></p>
                </div>
                <p id="gameModalDescription" class="game-modal__description"></p>
                <dl class="game-modal__meta">
                    <div>
                        <dt>Desarrollador</dt>
                        <dd id="gameModalDeveloper"></dd>
                    </div>
                    <div>
                        <dt>Publisher</dt>
                        <dd id="gameModalPublisher"></dd>
                    </div>
                    <div>
                        <dt>Plataforma</dt>
                        <dd id="gameModalPlatform"></dd>
                    </div>
                    <div>
                        <dt>Género</dt>
                        <dd id="gameModalGenre"></dd>
                    </div>
                </dl>
                <div class="game-modal__footer">
                    <button id="saveGameButton" class="game-modal__save" type="button">Guardar en el backend</button>
                    <a id="gameModalLink" class="game-modal__link" href="#" target="_blank" rel="noopener noreferrer">Ver juego</a>
                </div>
                <p id="gameModalStatus" class="game-modal__status"></p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
